<header>
	<!-- Discount banner -->
	<div class="discount-banner">
		<div class="discount-content">
			<span>Не пропусти! МЕГА знижки на Пʼятницю 13</span>
			<span>-50%</span>
			<span>-40%</span>
			<span>-30%</span>
		</div>
	</div>

	<!-- Top header with language and city selection -->
	<div class="top-header">
		<div class="container">
			<div class="top-header-content">
				<!-- Left menu -->
				<div class="lang-city">
					<div class="lang-selector">UA</div>
					<div class="city-selector">
						<svg width="12" height="17" viewBox="0 0 12 17" fill="none" xmlns="http://www.w3.org/2000/svg">
							<path
								d="M6 0C9.31371 3.48845e-08 12 2.90929 12 6.49805C12 10.0868 6 16.8262 6 16.8262C6 16.8262 2.55819e-05 10.0868 0 6.49805C0 2.90929 2.68629 0 6 0ZM5.93457 1.69434C3.5215 1.69449 1.56549 3.65038 1.56543 6.06348C1.56543 8.47663 3.52146 10.4334 5.93457 10.4336C8.34781 10.4336 10.3047 8.47672 10.3047 6.06348C10.3046 3.65029 8.34778 1.69434 5.93457 1.69434Z"
								fill="#323030" />
						</svg>

						<span>Черкаси</span>
						<svg width="8" height="4" viewBox="0 0 8 4" fill="none" xmlns="http://www.w3.org/2000/svg">
							<path d="M0 0H8L4 4L0 0Z" fill="#706F6F" />
						</svg>

					</div>
				</div>

				<!-- Right section -->
				<div class="menu-links">
					<div class="menu-item">
						<a href="#">Choice</a>
						<img src="images/dropdown.svg" alt="Dropdown">
					</div>
					<a href="#" class="menu-link">Врятувати світ</a>
					<a href="#" class="menu-link">Trade-In</a>
					<a href="#" class="menu-link">Доставка</a>
					<a href="#" class="menu-link">Повернення</a>
					<div class="help-link">
						<img src="images/help-icon.svg" alt="Help">
						<span>Допомога</span>
					</div>
				</div>

			</div>
		</div>
	</div>

	<!-- Main header with logo, search and cart -->
	<div class="main-header">
		<div class="container">
			<div class="main-header-content">
				<!-- Logo -->
				<div class="left-side__header">


					<div class="logo">
						<a href="#">
							<img src="images/logo.png" alt="Choice">
						</a>
					</div>

					<!-- Catalog button -->
					<div class="catalog-btn">
						<div class="burger-icon">
							<span></span>
							<span></span>
							<span></span>
						</div>
						<span>Каталог</span>
					</div>
				</div>
				<!-- Search -->
				<div class="middle-side__header">


					<div class="search-container">
						<div class="search-input">
							<div class="search-icon">
								<img src="images/search.svg" alt="Search">
							</div>
							<input type="text" placeholder="Я шукаю...">

							<div class="microphone-icon">
								<img src="images/microphone.svg" alt="Voice search">
							</div>
						</div>
						<button class="search-btn desktop-search-btn">Знайти</button>
						<button class="mobile-search-btn">
							<svg width="25" height="22" viewBox="0 0 25 22" fill="none" xmlns="http://www.w3.org/2000/svg">
								<path
									d="M2.01168 2.89977C5.00907 -0.588407 10.2665 -0.986159 13.7548 2.0111C16.855 4.67482 17.5119 9.12186 15.5166 12.5277L23.6435 19.5101C24.2363 20.0197 24.3034 20.9133 23.7939 21.5062C23.2844 22.0992 22.3908 22.1671 21.7978 21.6576L13.6943 14.6947C10.626 17.2871 6.0448 17.3457 2.90035 14.6439C-0.588025 11.6465 -0.985641 6.38821 2.01168 2.89977ZM12.0127 4.03844C9.64422 2.00359 6.07397 2.27455 4.03902 4.64294C2.0044 7.01137 2.27522 10.5807 4.64352 12.6156C7.01191 14.6504 10.5812 14.3804 12.6162 12.0121C14.6512 9.64365 14.3811 6.07344 12.0127 4.03844Z"
									fill="#F9FAFD" />
							</svg>
						</button>
					</div>
				</div>
				<div class="right-side__header">
					<!-- User actions -->
					<div class="user-actions">
						<a href="#" class="action-item">
							<img src="images/data-icon.svg" alt="Profile">
						</a>
						<span class="grey-line"></span>
						<a href="#" class="action-item">
							<img src="images/favorites.svg" alt="Favorites">
						</a>
						<a href="#" class="cart-btn">
							<svg width="28" height="24" viewBox="0 0 28 24" fill="none" xmlns="http://www.w3.org/2000/svg">
								<path
									d="M0.775945 11.3399H3.41688M27.1853 11.3399H24.5444M3.41688 11.3399L4.73735 23.2241H23.2239L24.5444 11.3399M3.41688 11.3399H6.05781M24.5444 11.3399H21.9034M6.05781 11.3399L11.3397 0.776118M6.05781 11.3399H21.9034M21.9034 11.3399L16.6215 0.776118"
									stroke="#0C4178" stroke-width="1.5" stroke-linecap="round" />
								<path d="M10.0181 15.2998H17.9409" stroke="#0C4178" stroke-width="1.27632"
									stroke-linecap="round" />
								<path d="M10.0181 17.9419H17.9409" stroke="#0C4178" stroke-width="1.27632"
									stroke-linecap="round" />
							</svg>

							<span>Кошик</span>
						</a>
					</div>
				</div>
			</div>
		</div>
	</div>
</header>
