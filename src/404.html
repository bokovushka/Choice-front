<!DOCTYPE html>
<html lang="uk">
@@include('html/head.html',{
"title":"Choice - Інтернет-магазин"
})

<body>
	@@include('html/header.html',{})

	<main>

		<div class="breadcrumbs-wrapper">
			<div class="container">
				<nav class="breadcrumbs" aria-label="Breadcrumb">
					<ol class="breadcrumbs__list">
						<li class="breadcrumbs__item breadcrumbs__item--home">
							<a href="/" class="breadcrumbs__link"><img src="images/icon-home.svg" alt="Головна"
									class="breadcrumbs__icon">Головна</a>
						</li>
						<li class="breadcrumbs__item"><span class="breadcrumbs__arrow"></span><span
								class="breadcrumbs__text">404</span></li>
					</ol>
				</nav>
			</div>
		</div>
		<section class="section-not-found">
			<div class="container">
				<div class="not-found-wrapper">
					<div class="not-found-left">
						<div class="not-found-left-title">404</div>
						<div class="not-found-left-desc">От халепа!</div>
						<div class="not-found-left-text">Здається, ви натрапили на сторінку, якої не існує. Спробуйте ще раз.
						</div>
						<a href="/" class="not-found-left-link">На головну</a>
					</div>
					<div class="not-found-right">
						<img src="images/icon-404.svg" alt="404">
					</div>
				</div>
			</div>
		</section>


	</main>
	@@include('html/footer.html',{})
	@@include('html/scripts.html',{})

</html>
