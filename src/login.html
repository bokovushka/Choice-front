<!DOCTYPE html>
<html lang="uk">
@@include('html/head.html',{
"title":"Choice - Інтернет-магазин"
})

<body>
	@@include('html/header.html',{})

	<main>
		<div class="auth-modal">
			<div class="auth-modal__content">
				<!-- Logo -->
				<div class="auth-modal__logo">
					<img src="images/logo.png" alt="Choice">
				</div>

				<!-- Modal Body -->
				<div class="auth-modal__body">
					<!-- Left Side - Form -->
					<div class="auth-modal__form-section">
						<!-- Tabs -->
						<div class="auth-modal__tabs">
							<button class="auth-modal__tab auth-modal__tab--active" data-tab="login">Вхід</button>
							<button class="auth-modal__tab" data-tab="register">Реєстрація</button>
						</div>

						<!-- Login Form -->
						<form class="auth-modal__form auth-modal__form--login auth-modal__form--active" id="loginForm">
							<div class="auth-modal__form-group">
								<label for="loginEmail" class="auth-modal__label">Email або номер телефону:</label>
								<input type="text" id="loginEmail" class="auth-modal__input"
									placeholder="Введіть ваш email або номер телефону">
							</div>

							<!-- <div class="auth-modal__form-options">
                                <a href="#" class="auth-modal__forgot-link">Забули пароль?</a>
                            </div> -->

							<button type="submit" class="auth-modal__submit-btn">Увійти через смс</button>
							<button type="submit" class="auth-modal__submit-link">Увійти через пароль</button>
						</form>

						<!-- Registration Form -->
						<form class="auth-modal__form auth-modal__form--register" id="registerForm">
							<div class="auth-modal__form-group">
								<label for="registerSurname" class="auth-modal__label">Прізвище</label>
								<input type="text" id="registerSurname" class="auth-modal__input"
									placeholder="Введіть ваше прізвище">
							</div>


							<div class="auth-modal__form-group">
								<label for="registerName" class="auth-modal__label">Ім'я</label>
								<input type="text" id="registerName" class="auth-modal__input" placeholder="Введіть ваше ім'я">
							</div>

							<div class="auth-modal__form-group">
								<label for="registerPhone" class="auth-modal__label">Телефон</label>
								<input type="text" id="registerPhone" class="auth-modal__input"
									placeholder="Введіть ваш номер телефону">
							</div>

							<div class="auth-modal__form-group">
								<label for="registerEmail" class="auth-modal__label">Email*</label>
								<input type="email" id="registerEmail" required class="auth-modal__input"
									placeholder="Введіть ваш email">
							</div>

							<div class="auth-modal__form-group">
								<label for="registerPassword" class="auth-modal__label">Пароль*</label>
								<input type="password" id="registerPassword" required class="auth-modal__input"
									placeholder="Створіть пароль">
							</div>

							<div class="auth-modal__form-group">
								<label for="confirmPassword" class="auth-modal__label">Підтвердіть пароль*</label>
								<input type="password" id="confirmPassword" required class="auth-modal__input"
									placeholder="Підтвердіть пароль">
							</div>

							<button type="submit" class="auth-modal__submit-btn">Зареєструватися</button>
							<div class="auth-modal__form-options">
								<span> Реєструючись, ви погоджуєтесь з <a href="#" class="auth-modal__terms-link">користувацькою
										угодою.</a></span>
							</div>
						</form>
					</div>

					<!-- Divider -->
					<div class="auth-modal__divider">
						<span>або</span>
					</div>

					<!-- Right Side - Social Login -->
					<div class="auth-modal__social-section">
						<h3 class="auth-modal__social-title">Увійти через</h3>

						<div class="auth-modal__social-buttons">
							<button class="auth-modal__social-btn auth-modal__social-btn--google">
								<img src="images/icon-google.svg" alt="Google">
								Google
							</button>

							<button class="auth-modal__social-btn auth-modal__social-btn--facebook">
								<img src="images/icon-fb-white.svg" alt="Facebook">
								Facebook
							</button>

							<button class="auth-modal__social-btn auth-modal__social-btn--apple">
								<img src="images/icon-apple.svg" alt="Apple">
								Apple
							</button>
						</div>


					</div>
				</div>
			</div>
		</div>
	</main>
	@@include('html/footer.html',{})
	@@include('html/scripts.html',{})
</body>

</html>
